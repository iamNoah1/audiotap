name: Bug Report
description: Something isn't working as expected
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: audiotap version
      description: Run `audiotap --version`
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: input
    id: ytdlp-version
    attributes:
      label: yt-dlp version
      description: Run `yt-dlp --version`
      placeholder: "2024.01.01"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      render: shell
      placeholder: 'audiotap "https://www.youtube.com/watch?v=..." --format mp3'
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output / error message
      render: text
